name: CycloneDX SBOM Generation

on:
  push:
    branches: [ main ]
    paths:
      - 'firewatch-backend/requirements*.txt'
      - 'firewatch-backend/setup.py'
      - 'firewatch-frontend/package.json'
      - 'firewatch-frontend/package-lock.json'
      - '.github/workflows/cyclonedx-sbom.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'firewatch-backend/requirements*.txt'
      - 'firewatch-backend/setup.py'
      - 'firewatch-frontend/package.json'
      - 'firewatch-frontend/package-lock.json'
  workflow_dispatch:

jobs:
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Backend SBOM (Python)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install CycloneDX for Python
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-python
      
      - name: Generate backend SBOM
        run: |
          cd firewatch-backend
          mkdir -p ../sbom
          cyclonedx-python -o ../sbom/backend-bom.json -f json -r requirements.txt
          cd ..
      
      - name: Generate dev dependencies SBOM
        run: |
          cd firewatch-backend
          cyclonedx-python -o ../sbom/backend-dev-bom.json -f json -r requirements-dev.txt
          cd ..
      
      # Frontend SBOM (Node.js)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'firewatch-frontend/package-lock.json'
      
      - name: Install Node dependencies
        run: |
          cd firewatch-frontend
          npm ci
          cd ..
      
      - name: Install CycloneDX for npm
        run: |
          npm install -g @cyclonedx/npm
      
      - name: Generate frontend SBOM
        run: |
          cd firewatch-frontend
          cyclonedx-npm --output-file ../sbom/frontend-bom.json --output-format json
          cd ..
      
      # Upload SBOMs as artifacts
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/
          retention-days: 90
      
      # Optional: Commit SBOMs back to repo
      - name: Commit SBOMs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sbom/
          git commit -m "chore: update SBOM artifacts" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
